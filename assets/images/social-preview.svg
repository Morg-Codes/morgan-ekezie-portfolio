                stop-color="#34d399"
                stop-opacity="0.18"
            />
            <stop
                offset="100%"
                stop-color="#34d399"
                stop-opacity="0"
            />
        </radialGradient>
    </defs>

    <rect
        width="1200"
        height="630"
        fill="url(#background)"
    />

    <circle
        cx="1050"
        cy="110"
        r="330"
        fill="url(#glow)"
    />

    <circle
        cx="140"
        cy="610"
        r="260"
